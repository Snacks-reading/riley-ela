<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Category Spellbook</title>
<script src="scripts/engine/storage.js"></script><script src="registry/embedded-registry.js"></script>
<style>
:root{--bg1:#1a0f40;--bg2:#0e3d58;--stroke:rgba(255,255,255,.10);--gold:#f0d082;--paper:#fff4d6}*{box-sizing:border-box}html,body{height:100%}body{margin:0;min-height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;background:radial-gradient(900px 480px at 20% 0%, rgba(101,48,190,.50), transparent 55%),radial-gradient(800px 420px at 96% 4%, rgba(61,178,214,.30), transparent 45%),linear-gradient(135deg,var(--bg1),var(--bg2));overflow:hidden}header{padding:18px 24px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:18px}h1{margin:0;font-size:50px;line-height:1}.sub{font-size:17px;opacity:.9;margin-top:6px}.back{text-decoration:none;color:#fff;padding:13px 20px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid var(--stroke);font-weight:800}.shell{margin:0 18px 18px;padding:14px;border-radius:26px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.08));height:calc(100vh - 108px)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 288px;gap:16px;height:100%}.board{border-radius:24px;border:1px solid rgba(255,255,255,.08);padding:16px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;background:linear-gradient(180deg,rgba(8,20,48,.22),rgba(5,12,30,.18));min-height:0}.summary{display:flex;gap:10px;flex-wrap:wrap}.pillHead{padding:10px 14px;border-radius:999px;background:rgba(67,34,120,.65);border:1px solid rgba(255,255,255,.10);font-weight:900}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;align-content:start;overflow:auto;padding-right:4px}.tile{text-decoration:none;color:#fff;display:flex;flex-direction:column;align-items:center;min-width:0;padding:14px 10px;border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(0,0,0,.10));border:1px solid rgba(255,255,255,.06)}.tile:hover,.tile:focus{outline:none;box-shadow:0 0 0 1px rgba(240,208,130,.35),0 0 18px rgba(240,208,130,.15)}.crest{width:82px;height:108px;border-radius:18px;border:2px solid rgba(240,208,130,.8);display:flex;align-items:center;justify-content:center;font-weight:950;font-size:30px;background:linear-gradient(180deg,rgba(35,52,121,.85),rgba(10,20,60,.85));color:#fff4d6;box-shadow:0 10px 16px rgba(0,0,0,.45)}.code{margin-top:10px;font-size:18px;font-weight:950;text-align:center}.title{margin-top:4px;text-align:center;font-size:15px;line-height:1.12}.meta{margin-top:7px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}.pill{padding:4px 8px;border-radius:999px;font-size:12px;font-weight:900;line-height:1;border:1px solid rgba(255,255,255,.12)}.pill.todo{background:rgba(255,255,255,.08);color:#fff4d6}.pill.progress{background:rgba(106,190,255,.18);color:#d7f0ff}.pill.done{background:rgba(136,219,160,.18);color:#e7ffef}.pager{display:flex;justify-content:space-between;align-items:center;gap:10px}.pageBtn{border:1px solid var(--stroke);background:rgba(255,255,255,.08);color:#fff;border-radius:18px;padding:10px 16px;font-weight:900;cursor:pointer}.pageBtn:disabled{opacity:.4;cursor:default}.pageLbl{font-weight:900}.avatarCard{border-radius:24px;overflow:hidden;background:rgba(5,12,30,.35);border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column}.avatarTitle{padding:14px 18px;text-align:center;background:rgba(5,9,24,.74);font-size:20px;font-weight:950;color:var(--paper)}.avatarWrap{flex:1;min-height:0;padding:10px}.avatarWrap img{width:100%;height:100%;object-fit:contain;object-position:top center;display:block;background:rgba(10,18,42,.22);border-radius:18px}.note{padding:12px 14px;font-size:15px;line-height:1.35;background:rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.08)}@media (max-width:1180px){.layout{grid-template-columns:minmax(0,1fr) 250px}.grid{grid-template-columns:repeat(3,minmax(0,1fr))}}@media (max-width:900px){body{overflow:auto}.shell{height:auto;min-height:calc(100vh - 108px)}.layout{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.avatarCard{min-height:440px}}@media (max-width:640px){h1{font-size:38px}.grid{grid-template-columns:1fr}}</style></head><body>
<header><div><h1 id="heading">Category</h1><div class="sub" id="sub">Choose a lesson.</div></div><a class="back" href="quest-board.html">Quest Board</a></header>
<div class="shell"><div class="layout"><section class="board"><div class="summary"><div class="pillHead" id="focusPill">Today's Focus</div><div class="pillHead" id="countPill">Installed Lessons</div></div><div class="grid" id="grid"></div><div class="pager"><button class="pageBtn" id="prevBtn">◀ Prev</button><div class="pageLbl" id="pageLbl">Page 1</div><button class="pageBtn" id="nextBtn">Next ▶</button></div></section><aside class="avatarCard"><div class="avatarTitle">Ry Ry The French Fry</div><div class="note" id="note">Master a lesson by scoring 90%+ across a 24-item session.</div><div class="avatarWrap"><img src="assets/avatars/riley_victory.png" alt="Ry Ry The French Fry"></div></aside></div></div>
<script>
const params=new URLSearchParams(location.search); const cat=params.get('cat')||'star-speller';
const categories=(window.RR_REGISTRY&&window.RR_REGISTRY.categories)||[]; const lessons=((window.RR_REGISTRY&&window.RR_REGISTRY.lessons&&window.RR_REGISTRY.lessons[cat])||[]);
const catRec=categories.find(c=>c.id===cat)||{title:'Category',purpose:'Choose a lesson.'};
document.getElementById('heading').textContent=catRec.title; document.getElementById('sub').textContent=catRec.purpose||'Choose a lesson.';
document.getElementById('focusPill').textContent=lessons.length?`Today's Focus: ${lessons[0].code} — ${lessons[0].title}`:'No lessons loaded';
document.getElementById('countPill').textContent=`Installed Lessons: ${lessons.length}`;
const mastery=(window.RR_STORAGE&&window.RR_STORAGE.loadMastery())||{}; const board=document.getElementById('grid'); const pageSize=8; let page=0; const totalPages=Math.max(1,Math.ceil(lessons.length/pageSize));
function badgeFor(code){ const rec=mastery[`${cat}:${code}`]; if(rec&&rec.completed) return '<span class="pill done">mastered</span>'; if(rec&&rec.attempts>0) return `<span class="pill progress">${rec.completionPercent||0}%</span>`; return '<span class="pill todo">not started</span>'; }
function render(){ board.innerHTML=''; const slice=lessons.slice(page*pageSize,(page+1)*pageSize); slice.forEach(({code,title})=>{ const a=document.createElement('a'); a.className='tile'; a.href=`lesson.html?cat=${encodeURIComponent(cat)}&lesson=${encodeURIComponent(code)}`; a.innerHTML=`<div class="crest">${code}</div><div class="code">${code}</div><div class="title">${title}</div><div class="meta">${badgeFor(code)}</div>`; board.appendChild(a); }); document.getElementById('pageLbl').textContent=`Page ${page+1} of ${totalPages}`; document.getElementById('prevBtn').disabled=page===0; document.getElementById('nextBtn').disabled=page>=totalPages-1; }
document.getElementById('prevBtn').onclick=()=>{ if(page>0){ page--; render(); }}; document.getElementById('nextBtn').onclick=()=>{ if(page<totalPages-1){ page++; render(); }}; render();
</script></body></html>
