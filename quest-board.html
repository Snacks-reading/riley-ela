
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Quest Board</title>
  <script src="scripts/engine/storage.js"></script>
  <script src="scripts/engine/registry.js"></script>
  <style>
    :root{--bg1:#1d0f48;--bg2:#0d4d68;--stroke:rgba(255,255,255,.10);--paper:#fff4d6}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(1000px 520px at 16% 0%, rgba(101,48,190,.55), transparent 58%),radial-gradient(800px 420px at 96% 4%, rgba(61,178,214,.30), transparent 45%),linear-gradient(135deg,var(--bg1),var(--bg2));overflow:hidden}
    header{padding:18px 24px 10px;display:flex;justify-content:space-between;gap:18px;align-items:flex-start}
    h1{margin:0;font-size:54px;line-height:.95;font-weight:950}.sub{margin-top:6px;color:rgba(255,245,220,.92);font-size:16px}
    .home{text-decoration:none;color:#fff;padding:13px 20px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid var(--stroke);font-weight:850}
    .shell{margin:0 18px 18px;padding:14px;border-radius:26px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.08));height:calc(100vh - 108px)}
    .layout{display:grid;grid-template-columns:minmax(0,1fr) 284px;gap:14px;height:100%}
    .board{border-radius:24px;border:1px solid rgba(255,255,255,.08);padding:16px;display:grid;grid-template-rows:1fr auto;gap:10px;background:linear-gradient(180deg,rgba(8,20,48,.22),rgba(5,12,30,.18));min-height:0}
    .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));grid-template-rows:repeat(2,minmax(0,1fr));gap:16px;align-content:stretch;min-height:0}
    .tile{text-decoration:none;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-width:0;padding:8px 6px 10px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.08));border:1px solid rgba(255,255,255,.04)}
    .tile:hover,.tile:focus{outline:none;box-shadow:0 0 0 1px rgba(240,208,130,.35),0 0 18px rgba(240,208,130,.15)}
    .bookWrap{width:100%;display:flex;justify-content:center;align-items:flex-start;min-height:138px}
    .tile img{width:min(100%,116px);height:auto;display:block;filter:drop-shadow(0 10px 16px rgba(0,0,0,.5));transition:transform .18s ease,filter .18s ease}
    .tile:hover img,.tile:focus img{transform:translateY(-3px) scale(1.02);filter:drop-shadow(0 10px 16px rgba(0,0,0,.5)) drop-shadow(0 0 10px rgba(240,208,130,.35))}
    .title{margin-top:6px;text-align:center;font-size:15px;line-height:1.08;font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.45)}
    .meta{margin-top:6px;min-height:22px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .pill{padding:4px 8px;border-radius:999px;font-size:12px;font-weight:900;line-height:1;border:1px solid rgba(255,255,255,.12)}
    .pill.todo{background:rgba(255,255,255,.08);color:#fff4d6}.pill.progress{background:rgba(106,190,255,.18);color:#d7f0ff}.pill.done{background:rgba(136,219,160,.18);color:#e7ffef}
    .pager{display:flex;justify-content:space-between;align-items:center;gap:10px}.pageBtn{border:1px solid var(--stroke);background:rgba(255,255,255,.08);color:#fff;border-radius:18px;padding:10px 16px;font-weight:900;cursor:pointer}.pageBtn:disabled{opacity:.4;cursor:default}.pageLbl{font-weight:900}
    .avatarCard{border-radius:24px;overflow:hidden;background:rgba(5,12,30,.35);border:1px solid rgba(255,255,255,.08);display:flex;flex-direction:column}
    .avatarTitle{padding:14px 18px;text-align:center;background:rgba(5,9,24,.74);font-size:20px;font-weight:950;color:var(--paper)}
    .avatarWrap{flex:1;min-height:0;padding:10px}.avatarWrap img{width:100%;height:100%;object-fit:contain;object-position:top center;display:block;background:rgba(10,18,42,.22);border-radius:18px}
    .statusBox{padding:12px 12px 0;display:grid;gap:10px}.statusCard{padding:12px 14px;border-radius:18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)} .statusCard b{display:block;margin-bottom:4px;font-size:13px;text-transform:uppercase;letter-spacing:.04em}.statusCard span{font-size:15px;font-weight:800}
    @media (max-width:1180px){.layout{grid-template-columns:minmax(0,1fr) 250px}.grid{grid-template-columns:repeat(4,minmax(0,1fr));grid-template-rows:repeat(3,minmax(0,1fr))}}
    @media (max-width:900px){body{overflow:auto}.shell{height:auto;min-height:calc(100vh - 108px)}.layout{grid-template-columns:1fr}.grid{grid-template-columns:repeat(3,minmax(0,1fr));grid-template-rows:none}.avatarCard{min-height:420px}}
    @media (max-width:640px){h1{font-size:38px}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
</head>
<body>
<header><div><h1>Quest Board</h1><div class="sub">Choose a spellbook to begin.</div></div><a class="home" href="index.html">Home</a></header>
<div class="shell"><div class="layout"><section class="board"><div class="grid" id="grid"></div><div class="pager"><button class="pageBtn" id="prevBtn">◀ Prev</button><div class="pageLbl" id="pageLbl">Page 1</div><button class="pageBtn" id="nextBtn">Next ▶</button></div></section><aside class="avatarCard"><div class="avatarTitle">Ry Ry The French Fry</div><div class="statusBox"><div class="statusCard"><b>Progress</b><span id="progressSummary">No lessons completed yet.</span></div><div class="statusCard"><b>Focus</b><span>Star Speller foundations first, then expand.</span></div></div><div class="avatarWrap"><img src="assets/avatars/avatar_teach.png" alt="Ry Ry The French Fry"></div></aside></div></div>
<script>
const categories=[["star-speller","Star Speller"],["wordplay-forge","Wordplay Forge"],["sight-word-galaxy","Sight-Word Galaxy"],["sound-breaker","Sound Breaker"],["syllable-smash","Syllable Smash"],["vowel-vault","Vowel Vault"],["consonant-lab","Consonant Lab"],["word-builders","Word Builders"],["morphology-mission","Morphology Mission"],["grammar-glider","Grammar Glider"],["sentence-sense","Sentence Sense"],["fluency-flight","Fluency Flight"],["meaning-makers","Meaning Makers"],["inference-station","Inference Station"],["story-quest","Story Quest"],["fact-finder","Fact Finder"],["writing-arena","Writing Arena"],["review-mastery-loop","Review & Mastery Loop"],["challenge-mode","Challenge Mode"]];
const mastery = window.RR_STORAGE ? window.RR_STORAGE.loadMastery() : {};
let completed=0, active=0; Object.values(mastery).forEach(r=>{ if(r&&r.completed) completed++; else if(r&&r.attempts>0) active++; });
document.getElementById('progressSummary').textContent = completed ? `${completed} lesson${completed===1?'':'s'} mastered${active?`, ${active} in progress`:''}.` : active ? `${active} lesson${active===1?'':'s'} in progress.` : `No lessons completed yet.`;
const grid=document.getElementById('grid'); const pageSize = 10; let page = 0; const totalPages = Math.ceil(categories.length / pageSize);
function render(){ grid.innerHTML=''; const slice = categories.slice(page*pageSize, (page+1)*pageSize); slice.forEach(([id,title])=>{ const a=document.createElement('a'); a.className='tile'; a.href=`category-board.html?cat=${encodeURIComponent(id)}`; let badge=''; if(id==='star-speller'){ const starRecords=Object.entries(mastery).filter(([k,v])=>k.startsWith('star-speller:')); const done=starRecords.filter(([,v])=>v.completed).length; const prog=starRecords.filter(([,v])=>!v.completed&&v.attempts>0).length; badge = done?`<span class="pill done">${done} done</span>`:prog?`<span class="pill progress">${prog} active</span>`:`<span class="pill todo">start here</span>`; } else { badge='<span class="pill todo">coming next</span>'; } a.innerHTML=`<div class="bookWrap"><img src="assets/books/${id}.png" alt="${title}"></div><div class="title">${title}</div><div class="meta">${badge}</div>`; grid.appendChild(a); }); document.getElementById('pageLbl').textContent = `Page ${page+1} of ${totalPages}`; document.getElementById('prevBtn').disabled = page===0; document.getElementById('nextBtn').disabled = page>=totalPages-1; }
document.getElementById('prevBtn').onclick=()=>{ if(page>0){ page--; render(); } };
document.getElementById('nextBtn').onclick=()=>{ if(page<totalPages-1){ page++; render(); } };
render();
</script></body></html>
